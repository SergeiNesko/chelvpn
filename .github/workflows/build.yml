name: Build ChelVPN APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'icon/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      v2rayng_version:
        description: 'v2rayNG version tag (e.g. 2.1.7)'
        required: false
        default: '2.1.7'

env:
  V2RAYNG_VERSION: ${{ github.event.inputs.v2rayng_version || '2.1.7' }}
  APP_NAME: ChelVPN
  APP_ID: top.chelvp.vpn
  DEEP_LINK_SCHEME: chelvpn
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout customization repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Clone v2rayNG with submodules
        run: |
          git clone --recurse-submodules --depth=1 --shallow-submodules \
            --branch ${{ env.V2RAYNG_VERSION }} \
            https://github.com/2dust/v2rayNG.git v2rayng

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '13114758'
          packages: 'platforms;android-36 build-tools;35.0.0 platform-tools'

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --channel=0 \
            --install "ndk;28.2.13676358"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          sed -i '10i\    ndkVersion = "28.2.13676358"' \
            v2rayng/V2rayNG/app/build.gradle.kts

      - name: Restore cached libhevtun
        id: cache-libhevtun
        uses: actions/cache/restore@v4
        with:
          path: v2rayng/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('v2rayng/.git/modules/hev-socks5-tunnel/HEAD') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun.outputs.cache-hit != 'true'
        run: |
          cd v2rayng
          bash compile-hevtun.sh

      - name: Save libhevtun cache
        if: steps.cache-libhevtun.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: v2rayng/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('v2rayng/.git/modules/hev-socks5-tunnel/HEAD') }}

      - name: Copy libhevtun to app/libs
        run: cp -r v2rayng/libs v2rayng/V2rayNG/app/

      - name: Get AndroidLibXrayLite tag
        run: |
          cd v2rayng/AndroidLibXrayLite
          XRAY_TAG=$(git describe --tags --abbrev=0)
          echo "XRAY_TAG=$XRAY_TAG" >> $GITHUB_ENV
          echo "AndroidLibXrayLite tag: $XRAY_TAG"

      - name: Download libv2ray.aar
        uses: robinraju/release-downloader@v1.13
        with:
          repository: '2dust/AndroidLibXrayLite'
          tag: ${{ env.XRAY_TAG }}
          fileName: 'libv2ray.aar'
          out-file-path: v2rayng/V2rayNG/app/libs/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Apply ChelVPN customizations
        run: |
          cd v2rayng/V2rayNG
          python3 ../../custom/customize.py \
            --app-name "${{ env.APP_NAME }}" \
            --app-id "${{ env.APP_ID }}" \
            --scheme "${{ env.DEEP_LINK_SCHEME }}" \
            --icon-src "../../custom/icon/ic_launcher.png"

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks

      - name: Build Release APK
        run: |
          cd v2rayng/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod +x gradlew
          ./gradlew assemblePlaystoreRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Collect APK
        run: |
          APK=$(find v2rayng/V2rayNG/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" "ChelVPN_${{ env.V2RAYNG_VERSION }}.apk"
          rm -f keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChelVPN_${{ env.V2RAYNG_VERSION }}
          path: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: v${{ env.V2RAYNG_VERSION }}-chelvpn
          name: ChelVPN ${{ env.V2RAYNG_VERSION }}
          body: |
            Автоматическая сборка ChelVPN на базе v2rayNG ${{ env.V2RAYNG_VERSION }}

            **Установка:**
            1. Скачай APK ниже
            2. Разреши установку из неизвестных источников
            3. Установи и получи ключ в боте @VpnChelyaba_Bot
          files: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          make_latest: true

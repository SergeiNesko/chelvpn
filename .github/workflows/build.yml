name: Build ChelVPN APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      v2rayng_version:
        description: 'v2rayNG version tag (for native libs)'
        required: false
        default: '2.1.7'

env:
  V2RAYNG_VERSION: ${{ github.event.inputs.v2rayng_version || '2.1.7' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout ChelVPN repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Clone v2rayNG with submodules (for native libs)
        run: |
          git clone --recurse-submodules --depth=1 --shallow-submodules \
            --branch ${{ env.V2RAYNG_VERSION }} \
            https://github.com/2dust/v2rayNG.git v2rayng

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '13114758'
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --channel=0 \
            --install "ndk;28.2.13676358"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          # Inject ndkVersion into v2rayNG so compile-hevtun.sh works
          sed -i '10i\    ndkVersion = "28.2.13676358"' \
            v2rayng/V2rayNG/app/build.gradle.kts

      - name: Restore cached libhevtun
        id: cache-libhevtun
        uses: actions/cache/restore@v4
        with:
          path: v2rayng/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('v2rayng/.git/modules/hev-socks5-tunnel/HEAD') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun.outputs.cache-hit != 'true'
        run: |
          cd v2rayng
          bash compile-hevtun.sh

      - name: Save libhevtun cache
        if: steps.cache-libhevtun.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: v2rayng/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('v2rayng/.git/modules/hev-socks5-tunnel/HEAD') }}

      - name: Download libv2ray.aar
        run: |
          cd v2rayng/AndroidLibXrayLite
          git fetch --tags --depth=1
          XRAY_TAG=$(git describe --tags --abbrev=0)
          echo "AndroidLibXrayLite version: $XRAY_TAG"
          mkdir -p ../../custom/android/app/libs
          wget \
            "https://github.com/2dust/AndroidLibXrayLite/releases/download/${XRAY_TAG}/libv2ray.aar" \
            -O ../../custom/android/app/libs/libv2ray.aar
          ls -lh ../../custom/android/app/libs/

      - name: Copy hev-socks5-tunnel .so files
        run: |
          mkdir -p custom/android/app/src/main/jniLibs
          cp -r v2rayng/libs/. custom/android/app/src/main/jniLibs/
          echo "=== jniLibs contents ==="
          find custom/android/app/src/main/jniLibs -name "*.so"

      - name: Download geo data files
        run: |
          mkdir -p custom/android/app/src/main/assets
          wget -q "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
               -O custom/android/app/src/main/assets/geoip.dat
          wget -q "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
               -O custom/android/app/src/main/assets/geosite.dat
          echo "=== assets ==="
          ls -lh custom/android/app/src/main/assets/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Copy Gradle wrapper from v2rayNG
        run: |
          cp v2rayng/V2rayNG/gradlew \
             custom/android/gradlew
          cp v2rayng/V2rayNG/gradle/wrapper/gradle-wrapper.jar \
             custom/android/gradle/wrapper/
          chmod +x custom/android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd custom/android
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          APK=$(find custom/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" "ChelVPN_${{ env.V2RAYNG_VERSION }}.apk"
          rm -f keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChelVPN_${{ env.V2RAYNG_VERSION }}
          path: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: v${{ env.V2RAYNG_VERSION }}-chelvpn
          name: ChelVPN ${{ env.V2RAYNG_VERSION }}
          body: |
            Сборка ChelVPN (кастомный VPN-клиент для @VpnChelyaba_Bot)

            **Установка:**
            1. Скачай APK ниже
            2. Разреши установку из неизвестных источников
            3. Установи и получи ключ/подписку в боте @VpnChelyaba_Bot
            4. Нажми «ПОДКЛЮЧИТЬ»
          files: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          make_latest: true

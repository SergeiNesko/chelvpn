name: Build ChelVPN APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'icon/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      v2rayng_version:
        description: 'v2rayNG version tag (e.g. 2.1.7)'
        required: false
        default: '2.1.7'

env:
  V2RAYNG_VERSION: ${{ github.event.inputs.v2rayng_version || '2.1.7' }}
  APP_NAME: ChelVPN
  DEEP_LINK_SCHEME: chelvpn
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout customization repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Install APKTool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O /usr/local/bin/apktool.jar
          printf '#!/bin/bash\nexec java -jar /usr/local/bin/apktool.jar "$@"\n' \
            | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Download v2rayNG APK
        run: |
          wget -q \
            "https://github.com/2dust/v2rayNG/releases/download/${{ env.V2RAYNG_VERSION }}/v2rayNG_${{ env.V2RAYNG_VERSION }}_universal.apk" \
            -O v2rayng.apk
          ls -lh v2rayng.apk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Decompile APK (resources only)
        run: apktool d v2rayng.apk -o decoded --no-src -f

      - name: Apply ChelVPN customizations
        run: |
          python3 custom/customize_apk.py \
            --decoded-dir decoded \
            --app-name "${{ env.APP_NAME }}" \
            --scheme "${{ env.DEEP_LINK_SCHEME }}" \
            --icon-src "custom/icon/ic_launcher.png"

      - name: Rebuild APK
        run: apktool b decoded -o ChelVPN_unsigned.apk

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -v 4 \
            ChelVPN_unsigned.apk ChelVPN_aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out "ChelVPN_${{ env.V2RAYNG_VERSION }}.apk" \
            ChelVPN_aligned.apk
          rm keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChelVPN_${{ env.V2RAYNG_VERSION }}
          path: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: v${{ env.V2RAYNG_VERSION }}-chelvpn
          name: ChelVPN ${{ env.V2RAYNG_VERSION }}
          body: |
            Автоматическая сборка ChelVPN на базе v2rayNG ${{ env.V2RAYNG_VERSION }}

            **Установка:**
            1. Скачай APK ниже
            2. Разреши установку из неизвестных источников
            3. Установи и получи ключ в боте @VpnChelyaba_Bot
          files: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          make_latest: true

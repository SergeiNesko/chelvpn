name: Build ChelVPN APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'icon/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      v2rayng_version:
        description: 'v2rayNG version tag (e.g. 2.1.7)'
        required: false
        default: '2.1.7'

env:
  V2RAYNG_VERSION: ${{ github.event.inputs.v2rayng_version || '2.1.7' }}
  APP_NAME: ChelVPN
  APP_ID: top.chelvp.vpn
  DEEP_LINK_SCHEME: chelvpn
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout customization repo
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Clone v2rayNG source
        run: |
          git clone --depth=1 --branch ${{ env.V2RAYNG_VERSION }} \
            https://github.com/2dust/v2rayNG.git v2rayng

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow for icon resizing
        run: pip install Pillow

      - name: Apply ChelVPN customizations
        run: |
          cd v2rayng/V2rayNG
          python3 ../../custom/customize.py \
            --app-name "${{ env.APP_NAME }}" \
            --app-id "${{ env.APP_ID }}" \
            --scheme "${{ env.DEEP_LINK_SCHEME }}" \
            --icon-src "../../custom/icon/ic_launcher.png"

      - name: Build Release APK (playstore flavor only)
        run: |
          cd v2rayng/V2rayNG
          chmod +x gradlew
          ./gradlew assemblePlaystoreRelease --no-daemon

      - name: Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          APK_PATH=$(find v2rayng/V2rayNG/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK_PATH"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -v 4 \
            "$APK_PATH" ChelVPN_aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks keystore.jks \
            --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out "ChelVPN_${{ env.V2RAYNG_VERSION }}.apk" \
            ChelVPN_aligned.apk
          rm keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChelVPN_${{ env.V2RAYNG_VERSION }}
          path: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: v${{ env.V2RAYNG_VERSION }}-chelvpn
          name: ChelVPN ${{ env.V2RAYNG_VERSION }}
          body: |
            Автоматическая сборка ChelVPN на базе v2rayNG ${{ env.V2RAYNG_VERSION }}

            **Установка:**
            1. Скачай APK ниже
            2. Разреши установку из неизвестных источников
            3. Установи и получи ключ в боте @VpnChelyaba_Bot
          files: ChelVPN_${{ env.V2RAYNG_VERSION }}.apk
          make_latest: true
